name: taskguard_ai
description: "TaskGuard AI - Smart task management with mental wellness protection."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  intl: ^0.20.2
  percent_indicator: ^4.2.3
  # Networking
  dio: ^5.4.3+1
  # Secure token storage
  flutter_secure_storage: ^9.2.2
  # Offline storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  # State management
  flutter_riverpod: ^2.5.1
  # Google Sign-In
  google_sign_in: ^6.2.1
  # Firebase (push notifications)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  # Local alarm notifications (works offline, no backend needed)
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  # Theme persistence
  shared_preferences: ^2.3.0
  # Voice / speech-to-text
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
